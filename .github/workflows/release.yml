name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release-dist-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build action
        run: pnpm run action:build
      - name: Create GitHub Release
        run: pnpm run npm:build && pnpm run npm:cli -- --yes --tag "${{ github.ref_name }}" --ref "${{ github.sha }}" --token "${{ github.token }}"
      - name: Publish dist branch
        run: pnpm run action:release
